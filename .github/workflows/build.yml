name: Build APK DEBAT Z

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generer le dossier android
        run: flutter create --org com.debatz --project-name debat_z --platforms=android .

      - name: Reglages Android
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = "[^"]*"/applicationId = "com.debatz.app"/' android/app/build.gradle.kts
          else
            sed -i 's/applicationId "[^"]*"/applicationId "com.debatz.app"/' android/app/build.gradle
          fi
          sed -i 's/android:label="[^"]*"/android:label="DEBAT Z"/' android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' android/app/src/main/AndroidManifest.xml; then
            sed -i 's#<manifest \(.*\)>#<manifest \1>\n    <uses-permission android:name="android.permission.INTERNET"/>#' android/app/src/main/AndroidManifest.xml
          fi

      - name: Dependances
        run: flutter pub get

      - name: Compiler l'APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: DEBAT-Z-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
